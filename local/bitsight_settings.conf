#
# Example Bitsight Settings Configuration
# Copy this file to bitsight_settings.conf and adjust values as needed
#
# To enable:
# 1. Copy this file: cp bitsight_settings.conf.example bitsight_settings.conf
# 2. Configure the API settings
# 3. Review proxy settings
# 4. Review enabled inputs
# 5. Review collection intervals
#

# =============================================================================
# FILE
# =============================================================================
# local/bitsight_settings.conf.example

# =============================================================================
# PURPOSE
# =============================================================================
# Example BitSight settings configuration
# for shared API settings
# for proxy settings
# for input enablement
# for collection interval settings
# for logging settings
# for validation settings

# =============================================================================
# FILE LOCATION
# =============================================================================
# Example file:
# local/bitsight_settings.conf.example
#
# Runtime file:
# local/bitsight_settings.conf

# =============================================================================
# GRANULAR DOCUMENTATION SPECIFICATION
# =============================================================================
# Section:
# settings
#
# Section:
# proxy
#
# Section:
# inputs
#
# Section:
# collection
#
# Section:
# logging
#
# Section:
# validation
#
# Shared API token model:
# one API token
# used by all BitSight inputs
#
# Boolean values:
# true
# false
#
# Interval values:
# seconds
#
# Historical values:
# days

[settings]
api_token =
base_url = https://api.bitsighttech.com
verify_ssl = true
timeout = 60

[proxy]
proxy_enabled = false
proxy_url =
proxy_username =
proxy_password =

[inputs]
input_portfolio = true
input_ratings = true
input_ratings_history = true
input_ratings_history_csv = false
input_company_details = true
input_country_details = false
input_company_requests_summary = false
input_findings = true
input_findings_compromised = true
input_findings_diligence = true
input_findings_summary = true
input_finding_comments = false
input_risk_vectors = true
input_alerts = true
input_exposed_credentials = true
input_threats = true
input_users = true
input_user_quota = true
input_user_company_views = true
input_folders = false
input_tiers = true
input_industries = true
input_assets = false
input_asset_risk_matrix = false
input_infrastructure = false
input_infrastructure_changes = false
input_ip_by_country = false
input_diligence_statistics = false
input_observations_statistics = false
input_industry_statistics = false
input_user_behavior_statistics = false
input_service_providers = false
input_products = false
input_ratings_tree = true
input_observations = false
input_findings_summaries = false
input_findings_statistics = false
input_peer_analytics = false
input_rating_distribution = false
input_nist_csf_report = false
input_preview_report = false
input_risk_vectors_summary = false

[collection]
portfolio_interval = 3600
ratings_interval = 3600
ratings_history_interval = 86400
ratings_history_csv_interval = 86400
company_details_interval = 86400
country_details_interval = 86400
company_requests_summary_interval = 86400
findings_interval = 3600
findings_compromised_interval = 3600
findings_diligence_interval = 3600
findings_summary_interval = 3600
finding_comments_interval = 3600
risk_vectors_interval = 3600
alerts_interval = 900
threats_interval = 3600
exposed_credentials_interval = 3600
users_interval = 86400
user_quota_interval = 86400
user_company_views_interval = 86400
folders_interval = 86400
tiers_interval = 86400
industries_interval = 86400
assets_interval = 86400
asset_risk_matrix_interval = 86400
infrastructure_interval = 86400
infrastructure_changes_interval = 3600
ip_by_country_interval = 86400
diligence_statistics_interval = 3600
observations_statistics_interval = 3600
industry_statistics_interval = 86400
user_behavior_statistics_interval = 86400
service_providers_interval = 86400
products_interval = 86400
ratings_tree_interval = 86400
observations_interval = 3600
findings_summaries_interval = 3600
findings_statistics_interval = 3600
peer_analytics_interval = 86400
rating_distribution_interval = 86400
nist_csf_report_interval = 86400
preview_report_interval = 86400
risk_vectors_summary_interval = 86400
days_back = 365

[logging]
log_level = INFO

[validation]
first_run = true
validated = false
last_validation =
