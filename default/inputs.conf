# =============================================================================
# default/inputs.conf
# BitSight for Splunk App
# Input Configuration
# =============================================================================
#
# PURPOSE
#
# This file defines the BitSight modular inputs used by the app to collect
# portfolio, ratings, findings, alerts, infrastructure, observations,
# benchmarking, reports, and reference datasets from BitSight APIs into Splunk.
#
# IMPORTANT
#
# - Do NOT store production secrets in default/inputs.conf.
# - Copy local/inputs.conf.example to local/inputs.conf.
# - Configure API token and environment-specific settings in local only.
# - Inputs are disabled by default in this file.
#
# COLLECTION MODEL
#
# Each stanza below defines:
#
# - modular input name
# - BitSight endpoint alias
# - Splunk target index
# - Splunk target sourcetype
# - collection interval
# - optional endpoint-specific parameters
#
# SOURCETYPE STANDARD
#
# Sourcetypes in this file use underscore naming consistently.
#
# COMPLETE SOURCETYPE INVENTORY IN THIS FILE
#
# bitsight_portfolio
# bitsight_ratings
# bitsight_ratings_history
# bitsight_ratings_history_csv
# bitsight_company
# bitsight_country
# bitsight_company_requests
# bitsight_findings
# bitsight_findings_compromised
# bitsight_findings_diligence
# bitsight_findings_summary
# bitsight_findings_comments
# bitsight_risk_vectors
# bitsight_alerts
# bitsight_threats
# bitsight_credentials
# bitsight_users
# bitsight_users_quota
# bitsight_users_views
# bitsight_folders
# bitsight_tiers
# bitsight_industries
# bitsight_assets
# bitsight_assets_statistics
# bitsight_infrastructure
# bitsight_infrastructure_changes
# bitsight_ip_by_country
# bitsight_diligence_statistics
# bitsight_observations_statistics
# bitsight_industry_statistics
# bitsight_user_behavior_statistics
# bitsight_providers
# bitsight_products
# bitsight_ratings_tree
# bitsight_observations
# bitsight_findings_summaries
# bitsight_findings_statistics
# bitsight_peer_analytics
# bitsight_rating_distribution
# bitsight_nist_csf
# bitsight_preview_report
# bitsight_risk_vectors_summary
#
# REQUIRED SETTINGS IN LOCAL CONFIGURATION
#
# api_token      = Your BitSight API token
# endpoint       = API endpoint alias defined by the modular input
# index          = Splunk index for data
# interval       = Collection interval in seconds
#
# OPTIONAL SETTINGS
#
# company_guid   = Specific company GUID
# user_guid      = Specific user GUID
# risk_vectors   = Comma-separated risk vector filter
# days_back      = Days of historical data to request
#
# PROXY SETTINGS
#
# proxy_enabled  = true/false
# proxy_url      = http://proxy:8080 or socks5://proxy:1080
# proxy_username = Proxy username
# proxy_password = Proxy password
#
# SSL / TIMEOUT SETTINGS
#
# verify_ssl     = true/false
# timeout        = Request timeout in seconds
# =============================================================================

# =============================================================================
# PORTFOLIO AND RATINGS
# =============================================================================

# Portfolio - Company list with ratings
[bitsight://portfolio]
endpoint = portfolio
index = security_bitsight
sourcetype = bitsight_portfolio
interval = 3600
disabled = 1

# Current Ratings Snapshot
[bitsight://current-ratings]
endpoint = current-ratings
index = security_bitsight
sourcetype = bitsight_ratings
interval = 3600
disabled = 1

# Historical Ratings (for trending)
[bitsight://ratings-history]
endpoint = ratings-history
index = security_bitsight
sourcetype = bitsight_ratings_history
days_back = 365
interval = 86400
disabled = 1

# Ratings History CSV Export
[bitsight://ratings-history-csv]
endpoint = ratings-history-csv
index = security_bitsight
sourcetype = bitsight_ratings_history_csv
interval = 86400
disabled = 1

# Company Details
[bitsight://company-details]
endpoint = company-details
index = security_bitsight
sourcetype = bitsight_company
interval = 86400
disabled = 1

# Country Details (1 year of data for subscribed countries)
[bitsight://country-details]
endpoint = country-details
index = security_bitsight
sourcetype = bitsight_country
interval = 86400
disabled = 1

# Company Requests Summary
[bitsight://company-requests-summary]
endpoint = company-requests-summary
index = security_bitsight
sourcetype = bitsight_company_requests
interval = 86400
disabled = 1

# =============================================================================
# FINDINGS AND RISK
# =============================================================================

# Findings - All
[bitsight://findings]
endpoint = findings
index = security_bitsight
sourcetype = bitsight_findings
interval = 3600
disabled = 1

# Findings - Compromised Systems
[bitsight://findings-compromised]
endpoint = findings
index = security_bitsight
sourcetype = bitsight_findings_compromised
risk_vectors = botnet_infections,spam_propagation,malware_servers,unsolicited_comm,potentially_exploited
interval = 3600
disabled = 1

# Findings - Diligence
[bitsight://findings-diligence]
endpoint = findings
index = security_bitsight
sourcetype = bitsight_findings_diligence
risk_vectors = spf,dkim,ssl_certificates,ssl_configurations,open_ports,web_appsec,patching_cadence,insecure_systems,server_software,desktop_software,mobile_software,dnssec,mobile_application_security,application_security,dmarc
interval = 3600
