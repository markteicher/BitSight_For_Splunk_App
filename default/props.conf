# =============================================================================
# default/props.conf
# BitSight for Splunk App
# Field Extraction and Parsing Configuration
# =============================================================================
#
# PURPOSE
#
# This file defines sourcetype-level parsing behavior for BitSight data.
#
# It controls:
#
# - timestamp extraction
# - line breaking
# - event merging
# - JSON / CSV field extraction mode
# - truncation behavior
# - lookup-based enrichment
#
# APP STANDARD
#
# This file uses underscore sourcetype naming to match the current app
# sourcetype standard used by inputs.conf, macros.conf, and dashboards.
#
# COMPLETE SOURCETYPE INVENTORY COVERED BY THIS FILE
#
# - bitsight_portfolio
# - bitsight_ratings
# - bitsight_ratings_history
# - bitsight_ratings_history_csv
# - bitsight_company
# - bitsight_country
# - bitsight_company_requests
# - bitsight_findings
# - bitsight_findings_compromised
# - bitsight_findings_diligence
# - bitsight_findings_summary
# - bitsight_findings_comments
# - bitsight_risk_vectors
# - bitsight_alerts
# - bitsight_threats
# - bitsight_credentials
# - bitsight_users
# - bitsight_users_quota
# - bitsight_users_views
# - bitsight_folders
# - bitsight_tiers
# - bitsight_industries
# - bitsight_assets
# - bitsight_assets_statistics
# - bitsight_infrastructure
# - bitsight_infrastructure_changes
# - bitsight_ip_by_country
# - bitsight_diligence_statistics
# - bitsight_observations_statistics
# - bitsight_industry_statistics
# - bitsight_user_behavior_statistics
# - bitsight_providers
# - bitsight_products
# - bitsight_ratings_tree
# - bitsight_observations
# - bitsight_findings_summaries
# - bitsight_findings_statistics
# - bitsight_peer_analytics
# - bitsight_rating_distribution
# - bitsight_nist_csf
# - bitsight_preview_report
# - bitsight_risk_vectors_summary
#
# PARSING MODEL
#
# Most BitSight datasets are JSON payloads and use:
#
# - SHOULD_LINEMERGE = false
# - LINE_BREAKER = ([\r\n]+)
# - KV_MODE = json
# - TRUNCATE = 0
#
# The ratings history CSV dataset uses:
#
# - INDEXED_EXTRACTIONS = CSV
# - KV_MODE = none
# - AUTO_KV_JSON = false
#
# TIMESTAMP MODEL
#
# Where a reliable dataset-specific timestamp field is known, TIME_PREFIX is set.
# Where a specific timestamp field is not guaranteed from the supplied design,
# only TIME_FORMAT / general JSON parsing behavior is applied.
#
# LOOKUP ENRICHMENT
#
# Lookup enrichment is applied only where explicitly defined below.
#
# =============================================================================
# PORTFOLIO AND COMPANY DATA
# =============================================================================

[bitsight_portfolio]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = "rating_date"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 30
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
KV_MODE = json
TRUNCATE = 0

[bitsight_company]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
