#
# File: default/transforms.conf
# Bitsight field transformations
#
# =============================================================================
# PURPOSE
# =============================================================================
# Defines lookup transformation stanzas used by the Bitsight app.
#
# This file maps:
# - the transformation stanza name referenced by searches and props.conf
# - the CSV lookup file associated with that transformation
#
# =============================================================================
# FILE LOCATION
# =============================================================================
# App-relative path:
#   default/transforms.conf
#
# Local override path, if needed:
#   local/transforms.conf
#
# Lookup file directory:
#   lookups/
#
# =============================================================================
# GRANULAR DOCUMENTATION SPECIFICATION
# =============================================================================
#
# STANZA: [bitsight_rating_category]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines the lookup transformation for Bitsight rating category enrichment.
#
# filename:
#   CSV lookup file used by this transformation.
#   Relative lookup file path:
#     lookups/bitsight_rating_categories.csv
#
# STANZA: [bitsight_risk_vectors]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines the lookup transformation for Bitsight risk vector enrichment.
#
# filename:
#   CSV lookup file used by this transformation.
#   Relative lookup file path:
#     lookups/bitsight_risk_vectors.csv
#
# STANZA: [bitsight_severity_levels]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines the lookup transformation for Bitsight severity level enrichment.
#
# filename:
#   CSV lookup file used by this transformation.
#   Relative lookup file path:
#     lookups/bitsight_severity_levels.csv
#
# =============================================================================
# LOOKUP TRANSFORM DEFINITIONS
# =============================================================================

[bitsight_rating_category]
filename = bitsight_rating_categories.csv

[bitsight_risk_vectors]
filename = bitsight_risk_vectors.csv

[bitsight_severity_levels]
filename = bitsight_severity_levels.csv
