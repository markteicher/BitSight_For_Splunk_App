# =============================================================================
# default/indexes.conf
# BitSight for Splunk App
# Index Configuration
# =============================================================================
#
# FILE PURPOSE
#
# This file defines the Splunk index used by the BitSight app to store
# BitSight API data collected by the modular inputs.
#
# PRIMARY INDEX
#
#   security_bitsight
#
# WHAT THIS FILE CONTROLS
#
# - index name
# - hot/warm storage path
# - cold storage path
# - thawed storage path
# - maximum total index size
# - retention period
# - hot bucket count
# - warm bucket count
# - bucket sizing mode
# - TSIDX reduction behavior
# - bloom filter path
#
# APP RELATIONSHIP
#
# The BitSight app modular inputs write BitSight datasets into:
#
#   index = security_bitsight
#
# This index is expected by dashboards, searches, reports, and saved searches
# across the app.
#
# DATA STORED IN THIS INDEX
#
# The security_bitsight index stores BitSight operational, posture, analytics,
# and reference datasets, including the sourcetypes below.
#
# COMPLETE SOURCETYPE INVENTORY EXPECTED IN THIS INDEX
#
# - bitsight_portfolio
# - bitsight_ratings
# - bitsight_ratings_history
# - bitsight_ratings_history_csv
# - bitsight_company
# - bitsight_country
# - bitsight_company_requests
# - bitsight_findings
# - bitsight_findings_compromised
# - bitsight_findings_diligence
# - bitsight_findings_summary
# - bitsight_findings_comments
# - bitsight_risk_vectors
# - bitsight_alerts
# - bitsight_threats
# - bitsight_credentials
# - bitsight_users
# - bitsight_users_quota
# - bitsight_users_views
# - bitsight_folders
# - bitsight_tiers
# - bitsight_industries
# - bitsight_assets
# - bitsight_assets_statistics
# - bitsight_infrastructure
# - bitsight_infrastructure_changes
# - bitsight_ip_by_country
# - bitsight_diligence_statistics
# - bitsight_observations_statistics
# - bitsight_industry_statistics
# - bitsight_user_behavior_statistics
# - bitsight_providers
# - bitsight_products
# - bitsight_ratings_tree
# - bitsight_observations
# - bitsight_findings_summaries
# - bitsight_findings_statistics
# - bitsight_peer_analytics
# - bitsight_rating_distribution
# - bitsight_nist_csf
# - bitsight_preview_report
# - bitsight_risk_vectors_summary
#
# PLATFORM NOTES
#
# SPLUNK CLOUD
#
# - Indexes usually must be provisioned through Splunk Cloud / Splunk Support.
# - This file documents the intended index definition for the app.
#
# SPLUNK ENTERPRISE
#
# - Index creation from app configuration depends on administrative policy.
# - The Splunk administrator must allow app-managed index definitions if the
#   app is expected to create the index automatically.
#
# STORAGE MODEL
#
# hot/warm path:
#   Active searchable buckets are stored under:
#   $SPLUNK_DB/security_bitsight/db
#
# cold path:
#   Older searchable buckets are stored under:
#   $SPLUNK_DB/security_bitsight/colddb
#
# thawed path:
#   Restored archived buckets are placed under:
#   $SPLUNK_DB/security_bitsight/thaweddb
#
# bloom filter path:
#   Bloom filter structures are stored under:
#   $SPLUNK_DB/security_bitsight/bloomfilter
#
# RETENTION MODEL
#
# frozenTimePeriodInSecs = 31536000
#
# This equals:
# - 365 days
# - 1 year
#
# After data ages out of retention, buckets are eligible to freeze according
# to Splunk index lifecycle rules.
#
# SIZE MODEL
#
# maxTotalDataSizeMB = 512000
#
# This equals approximately:
# - 512 GB of indexed data
#
# BUCKET MODEL
#
# maxHotBuckets = 10
#   Limits the number of simultaneous hot buckets before rolling.
#
# maxWarmDBCount = 300
#   Limits the number of warm buckets retained before cold/frozen progression.
#
# maxDataSize = auto_high_volume
#   Uses Splunk high-volume bucket sizing behavior.
#
# PERFORMANCE MODEL
#
# enableTsidxReduction = true
#   Allows Splunk to reduce tsidx footprint on eligible buckets to save storage.
#
# tsidxReductionCheckPeriodInSec = 600
#   Checks every 10 minutes for eligible buckets.
#
# bloomHomePath
#   Enables bloom filter storage for faster search performance on qualifying
#   workloads.
#
# CHANGE CONTROL GUIDANCE
#
# Review these settings if any of the following change:
#
# - BitSight API collection volume increases
# - ratings history lookback increases
# - findings volume materially increases
# - alert frequency increases
# - retention requirements change
# - Splunk storage constraints change
#
# COMMON TUNING AREAS
#
# Retention:
# - frozenTimePeriodInSecs
#
# Capacity:
# - maxTotalDataSizeMB
#
# Bucket behavior:
# - maxHotBuckets
# - maxWarmDBCount
# - maxDataSize
#
# Search/storage optimization:
# - enableTsidxReduction
# - tsidxReductionCheckPeriodInSec
# - bloomHomePath
#
# =============================================================================
# INDEX DEFINITION
# =============================================================================

[security_bitsight]

# -----------------------------------------------------------------------------
# Searchable hot/warm bucket path
# -----------------------------------------------------------------------------
homePath = $SPLUNK_DB/security_bitsight/db

# -----------------------------------------------------------------------------
# Searchable cold bucket path
# -----------------------------------------------------------------------------
coldPath = $SPLUNK_DB/security_bitsight/colddb

# -----------------------------------------------------------------------------
# Restored archive bucket path
# -----------------------------------------------------------------------------
thawedPath = $SPLUNK_DB/security_bitsight/thaweddb

# -----------------------------------------------------------------------------
# Maximum total on-disk index size in MB
# 512000 MB = approximately 512 GB
# -----------------------------------------------------------------------------
maxTotalDataSizeMB = 512000

# -----------------------------------------------------------------------------
# Retention period in seconds
# 31536000 seconds = 365 days
# -----------------------------------------------------------------------------
frozenTimePeriodInSecs = 31536000

# -----------------------------------------------------------------------------
# Maximum number of hot buckets before rolling
# -----------------------------------------------------------------------------
maxHotBuckets = 10

# -----------------------------------------------------------------------------
# Maximum number of warm buckets
# -----------------------------------------------------------------------------
maxWarmDBCount = 300

# -----------------------------------------------------------------------------
# Splunk bucket sizing mode
# Recommended here for higher-volume index behavior
# -----------------------------------------------------------------------------
maxDataSize = auto_high_volume

# -----------------------------------------------------------------------------
# TSIDX reduction
# Improves storage efficiency for older eligible buckets
# -----------------------------------------------------------------------------
enableTsidxReduction = true

# -----------------------------------------------------------------------------
# TSIDX reduction evaluation interval
# 600 seconds = 10 minutes
# -----------------------------------------------------------------------------
tsidxReductionCheckPeriodInSec = 600

# -----------------------------------------------------------------------------
# Bloom filter storage path
# Improves search efficiency for supported search patterns
# -----------------------------------------------------------------------------
bloomHomePath = $SPLUNK_DB/security_bitsight/bloomfilter
