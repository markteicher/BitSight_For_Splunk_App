#
# File: default/web.conf
# Web configuration for Bitsight app
#
# =============================================================================
# PURPOSE
# =============================================================================
# Defines web-layer configuration for the Bitsight app.
#
# This file controls:
# - Splunk Web behavior relevant to the app
# - URL exposure rules for app web endpoints
#
# =============================================================================
# FILE LOCATION
# =============================================================================
# App-relative path:
#   default/web.conf
#
# Local override path:
#   local/web.conf
#
# =============================================================================
# GRANULAR DOCUMENTATION SPECIFICATION
# =============================================================================
#
# STANZA: [settings]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines Splunk Web settings applicable to the app.
#
# enableSplunkWebSSL:
#   Controls whether Splunk Web SSL is enabled.
#   This is a Splunk Web setting and should only be set here if intentionally
#   managed by the app deployment model.
#
# STANZA: [expose:bitsight]
# -----------------------------------------------------------------------------
# Purpose:
#   Exposes app web endpoints under the Bitsight path.
#
# pattern:
#   URL pattern exposed by Splunk Web for this app.
#
# methods:
#   Allowed HTTP methods for the exposed path.
#
# =============================================================================
# WEB CONFIGURATION
# =============================================================================

[settings]
enableSplunkWebSSL = false

[expose:bitsight]
pattern = bitsight/*
methods = GET, POST
