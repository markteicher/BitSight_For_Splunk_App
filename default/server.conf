#
# File: default/serverclass.conf
# Server class definitions for Bitsight app
#
# =============================================================================
# PURPOSE
# =============================================================================
# Defines the server class mappings used by the Bitsight app.
#
# =============================================================================
# FILE LOCATION
# =============================================================================
# App-relative path:
#   default/serverclass.conf
#
# Local override path, if needed:
#   local/serverclass.conf
#
# =============================================================================
# GRANULAR DOCUMENTATION SPECIFICATION
# =============================================================================
#
# STANZA: [bitsight_settings]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines the server class entry for the Bitsight settings handler.
#
# match:
#   Logical match identifier for this server class.
#   Value:
#     bitsight_settings
#
# module:
#   Python module that implements the handler logic for this server class.
#   Value:
#     bitsight_setup_handler
#
# =============================================================================
# SERVER CLASS DEFINITIONS
# =============================================================================

[bitsight_settings]
match = bitsight_settings
module = bitsight_setup_handler
