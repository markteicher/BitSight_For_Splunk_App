# =============================================================================
# default/macros.conf
# BitSight for Splunk App
# Search Macro Configuration
# =============================================================================
#
# PURPOSE
#
# This file defines reusable Splunk search macros for the BitSight app.
#
# These macros provide:
#
# - base index shortcuts
# - base sourcetype shortcuts
# - rating classification helpers
# - severity classification helpers
# - risk vector classification helpers
# - time range shortcuts
# - company / tier / industry filter helpers
# - aggregation helpers
# - trending helpers
# - threshold helpers
# - formatting helpers
# - lookup enrichment helpers
# - dashboard helper macros
#
# MACRO DESIGN MODEL
#
# The macros in this file are intended to:
#
# - reduce repeated SPL across dashboards and saved searches
# - enforce consistent sourcetype usage
# - enforce consistent rating category logic
# - enforce consistent severity normalization
# - provide readable shorthand for common BitSight datasets
#
# INDEX STANDARD
#
# All BitSight data is expected in:
#
#   index=security_bitsight
#
# SOURCETYPE STANDARD
#
# Sourcetypes in this file follow underscore naming consistently.
#
# COMPLETE SOURCETYPE INVENTORY REFERENCED BY THIS FILE
#
# - bitsight_portfolio
# - bitsight_ratings
# - bitsight_ratings_history
# - bitsight_ratings_history_csv
# - bitsight_company
# - bitsight_country
# - bitsight_company_requests
# - bitsight_findings
# - bitsight_findings_compromised
# - bitsight_findings_diligence
# - bitsight_findings_summary
# - bitsight_findings_comments
# - bitsight_risk_vectors
# - bitsight_alerts
# - bitsight_threats
# - bitsight_credentials
# - bitsight_users
# - bitsight_users_quota
# - bitsight_users_views
# - bitsight_folders
# - bitsight_tiers
# - bitsight_industries
# - bitsight_assets
# - bitsight_assets_statistics
# - bitsight_infrastructure
# - bitsight_infrastructure_changes
# - bitsight_ip_by_country
# - bitsight_diligence_statistics
# - bitsight_observations_statistics
# - bitsight_industry_statistics
# - bitsight_user_behavior_statistics
# - bitsight_providers
# - bitsight_products
# - bitsight_ratings_tree
# - bitsight_observations
# - bitsight_findings_summaries
# - bitsight_findings_statistics
# - bitsight_peer_analytics
# - bitsight_rating_distribution
# - bitsight_nist_csf
# - bitsight_preview_report
# - bitsight_risk_vectors_summary
#
# RATING CATEGORY STANDARD
#
# Ratings are normalized into:
#
# - Advanced = 740+
# - Good     = 700-739
# - Fair     = 640-699
# - Warning  = 500-639
# - Critical = <500
#
# SEVERITY NORMALIZATION STANDARD
#
# Severity values are normalized into severity_numeric buckets as follows:
#
# - critical / severe = 5
# - high / material   = 4
# - medium / moderate = 3
# - low / minor       = 2
# - informational     = 1
# - unknown / other   = 0
#
# =============================================================================
# BASE INDEX MACROS
# =============================================================================

# -----------------------------------------------------------------------------
# Base index macro
# -----------------------------------------------------------------------------
[bitsight_index]
definition = index=security_bitsight
iseval = 0

# -----------------------------------------------------------------------------
# Core portfolio and ratings datasets
# -----------------------------------------------------------------------------
[bitsight_portfolio]
definition = `bitsight_index` sourcetype=bitsight_portfolio
iseval = 0

