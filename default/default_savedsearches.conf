# =============================================================================
# default/savedsearches.conf
# BitSight for Splunk App
# Saved Searches, Correlation Rules, Scheduled Reports, and Health Checks
# =============================================================================
#
# PURPOSE
#
# This file defines the app's scheduled searches for:
#
# - rating monitoring
# - findings monitoring
# - credential exposure monitoring
# - threat monitoring
# - portfolio monitoring
# - compliance and reporting
# - correlation rules
# - MTTR / SLA monitoring
# - scheduled PDF / email-ready reports
# - validation and health checks
#
# CONFIGURATION STANDARD
#
# - index standard: security_bitsight
# - sourcetype standard: underscore naming
# - legacy colon sourcetypes removed
# - index=main references removed
# - severity normalization corrected
# - invalid SPL constructs corrected
# - email / webhook / pagerduty actions disabled by default in default/
#   and should be enabled in local/savedsearches.conf
#
# COMPLETE SOURCETYPE INVENTORY REFERENCED BY THIS APP
#
# - bitsight_portfolio
# - bitsight_ratings
# - bitsight_ratings_history
# - bitsight_ratings_history_csv
# - bitsight_company
# - bitsight_country
# - bitsight_company_requests
# - bitsight_findings
# - bitsight_findings_compromised
# - bitsight_findings_diligence
# - bitsight_findings_summary
# - bitsight_findings_comments
# - bitsight_risk_vectors
# - bitsight_alerts
# - bitsight_threats
# - bitsight_credentials
# - bitsight_users
# - bitsight_users_quota
# - bitsight_users_views
# - bitsight_folders
# - bitsight_tiers
# - bitsight_industries
# - bitsight_assets
# - bitsight_assets_statistics
# - bitsight_infrastructure
# - bitsight_infrastructure_changes
# - bitsight_ip_by_country
# - bitsight_diligence_statistics
# - bitsight_observations_statistics
# - bitsight_industry_statistics
# - bitsight_user_behavior_statistics
# - bitsight_providers
# - bitsight_products
# - bitsight_ratings_tree
# - bitsight_observations
# - bitsight_findings_summaries
# - bitsight_findings_statistics
# - bitsight_peer_analytics
# - bitsight_rating_distribution
# - bitsight_nist_csf
# - bitsight_preview_report
# - bitsight_risk_vectors_summary
#
# RATING THRESHOLD STANDARD
#
# - Advanced = 740+
# - Good     = 700-739
# - Fair     = 640-699
# - Warning  = 500-639
# - Critical = <500
#
# SEVERITY NORMALIZATION STANDARD
#
# - critical / severe
# - high / material
# - medium / moderate
# - low / minor
#
# =============================================================================
# RATING MONITORING
# =============================================================================

[Bitsight - Rating Drop Alert]
description = Alert when any company's security rating drops
search = index=security_bitsight sourcetype=bitsight_ratings_history | stats latest(rating) as current_rating earliest(rating) as previous_rating by company_name company_guid | eval rating_change=current_rating-previous_rating | where isnotnull(previous_rating) AND rating_change<0 | eval severity=case(rating_change<=-50,"critical",rating_change<=-20,"high",rating_change<=-10,"medium",true(),"low") | table company_name company_guid previous_rating current_rating rating_change severity
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 */4 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 24h
alert.suppress.fields = company_guid
alert.track = 1
action.email = 0
action.bitsight_webhook_alert = 0

[Bitsight - Critical Rating Threshold]
description = Alert when any company falls below critical rating threshold below 500
search = index=security_bitsight sourcetype=bitsight_portfolio | eval company_guid=coalesce(company_guid,guid), company_name=coalesce(company_name,name) | where rating<500 | stats latest(rating) as rating latest(_time) as last_seen by company_name company_guid | eval severity=case(rating<300,"critical",rating<400,"high",rating<500,"medium") | convert ctime(last_seen) | table company_name company_guid rating severity last_seen
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 5
alert.track = 1

[Bitsight - Rating Trend Analysis]
description = Weekly rating trend analysis for all monitored companies
search = index=security_bitsight sourcetype=bitsight_ratings_history | bin _time span=1d | stats avg(rating) as daily_avg by company_name company_guid _time | sort 0 company_guid _time | streamstats window=7 avg(daily_avg) as weekly_avg by company_guid | eval trend=case(daily_avg>weekly_avg,"improving",daily_avg<weekly_avg,"declining",true(),"stable") | where isnotnull(weekly_avg) | table _time company_name company_guid daily_avg weekly_avg trend
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
cron_schedule = 0 6 * * 1
enableSched = 1
is_visible = 1
disabled = 0

# =============================================================================
# FINDINGS MONITORING
# =============================================================================

[Bitsight - Critical Findings Alert]
description = Alert on new critical severity findings
search = index=security_bitsight sourcetype=bitsight_findings | eval severity_norm=lower(severity) | where severity_norm="critical" OR severity_norm="severe" | stats count as finding_count values(risk_vector) as risk_vectors values(asset) as affected_assets by company_name company_guid | where finding_count>0 | table company_name company_guid finding_count risk_vectors affected_assets
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 5
alert.track = 1

[Bitsight - New Findings Summary]
description = Daily summary of new findings across all companies
search = index=security_bitsight sourcetype=bitsight_findings | eval severity_norm=case(lower(severity)="critical" OR lower(severity)="severe","critical",lower(severity)="high" OR lower(severity)="material","high",lower(severity)="medium" OR lower(severity)="moderate","medium",lower(severity)="low" OR lower(severity)="minor","low",true(),"other") | bin _time span=1d | stats count as total_findings count(eval(severity_norm="critical")) as critical count(eval(severity_norm="high")) as high count(eval(severity_norm="medium")) as medium count(eval(severity_norm="low")) as low dc(company_name) as companies_affected dc(risk_vector) as risk_vectors_affected by _time | sort 0 _time
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 8 * * *
enableSched = 1
is_visible = 1
disabled = 0

[Bitsight - Compromised Systems Detected]
description = Alert on botnet infections malware or compromised systems
search = index=security_bitsight sourcetype=bitsight_findings_compromised | where risk_vector="botnet_infections" OR risk_vector="spam_propagation" OR risk_vector="malware_servers" OR risk_vector="unsolicited_comm" OR risk_vector="potentially_exploited" | stats count as infection_count values(asset) as affected_assets values(details) as details by company_name company_guid risk_vector | table company_name company_guid risk_vector infection_count affected_assets details
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = */30 * * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 5
alert.track = 1

[Bitsight - Open Ports Detected]
description = Alert on dangerous open ports discovered
search = index=security_bitsight sourcetype=bitsight_findings risk_vector="open_ports" | rex field=details "port[:\\s]+(?<port>\\d+)" | eval port_num=tonumber(port) | where in(port_num,21,22,23,25,135,137,138,139,445,1433,1434,3306,3389,5432,5900,5901) | stats count as open_port_count values(port_num) as dangerous_ports values(asset) as affected_assets by company_name company_guid | table company_name company_guid dangerous_ports open_port_count affected_assets
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 */6 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 4
alert.track = 1

[Bitsight - SSL Certificate Issues]
description = Alert on SSL certificate vulnerabilities or expirations
search = index=security_bitsight sourcetype=bitsight_findings | where risk_vector="ssl_certificates" OR risk_vector="ssl_configurations" | stats count as ssl_issues values(details) as issue_details values(asset) as affected_assets by company_name company_guid severity | table company_name company_guid severity ssl_issues issue_details affected_assets
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 7 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 3
alert.track = 1

[Bitsight - Patching Cadence Issues]
description = Alert on systems with poor patching practices
search = index=security_bitsight sourcetype=bitsight_findings | eval severity_norm=lower(severity) | where risk_vector="patching_cadence" AND (severity_norm="critical" OR severity_norm="severe" OR severity_norm="high" OR severity_norm="material") | stats count as patching_issues values(asset) as affected_assets by company_name company_guid | where patching_issues>5 | table company_name company_guid patching_issues affected_assets
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 8 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 3
alert.track = 1

# =============================================================================
# CREDENTIAL EXPOSURE MONITORING
# =============================================================================

[Bitsight - Exposed Credentials Alert]
description = Alert on newly discovered exposed credentials dark web monitoring
search = index=security_bitsight sourcetype=bitsight_credentials | eval breach_source_field=coalesce(breach_name,breach_source,breach_id) | stats count as credential_count dc(email) as unique_emails values(breach_source_field) as breach_sources latest(breach_date) as latest_breach by company_name company_guid | where credential_count>0 | eval severity=case(credential_count>=100,"critical",credential_count>=50,"high",credential_count>=10,"medium",true(),"low") | table company_name company_guid credential_count unique_emails breach_sources latest_breach severity
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 */4 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 24h
alert.suppress.fields = company_guid
alert.track = 1

[Bitsight - Executive Credential Exposure]
description = Alert on exposed credentials for executive-level accounts
search = index=security_bitsight sourcetype=bitsight_credentials | eval email_l=lower(email) | where like(email_l,"%ceo%") OR like(email_l,"%cfo%") OR like(email_l,"%cto%") OR like(email_l,"%ciso%") OR like(email_l,"%president%") OR like(email_l,"%director%") OR like(email_l,"%vp@%") OR like(email_l,"%vice.president%") | eval breach_source_field=coalesce(breach_name,breach_source,breach_id) | stats count as exec_credentials values(email) as exposed_emails values(breach_source_field) as breach_sources by company_name company_guid | table company_name company_guid exec_credentials exposed_emails breach_sources
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
cron_schedule = 0 9 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 5
alert.track = 1

[Bitsight - Credential Breach Trend]
description = Weekly trend of credential exposures
search = index=security_bitsight sourcetype=bitsight_credentials | timechart span=1d dc(email) as unique_credentials count as total_exposures
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
cron_schedule = 0 6 * * 1
enableSched = 1
is_visible = 1
disabled = 0

