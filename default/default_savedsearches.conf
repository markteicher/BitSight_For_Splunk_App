[Bitsight - Active Threats Detected]
description = Alert on active threat indicators for monitored companies
search = index=security_bitsight sourcetype=bitsight_threats | stats count as threat_count values(threat_type) as threat_types values(indicator) as indicators by company_name company_guid | where threat_count>0 | table company_name company_guid threat_count threat_types indicators
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = */30 * * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 5
alert.track = 1

# =============================================================================
# PORTFOLIO MONITORING
# =============================================================================

[Bitsight - Portfolio Risk Summary]
description = Daily portfolio risk summary report
search = index=security_bitsight sourcetype=bitsight_portfolio | eval company_guid=coalesce(company_guid,guid), company_name=coalesce(company_name,name) | stats latest(rating) as rating values(tier) as tier values(industry) as industry by company_name company_guid | eval risk_level=case(rating>=740,"Low",rating>=640,"Moderate",rating>=500,"High",true(),"Critical") | stats count as company_count avg(rating) as avg_rating by risk_level | eval avg_rating=round(avg_rating,1) | table risk_level company_count avg_rating
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 7 * * *
enableSched = 1
is_visible = 1
disabled = 0

[Bitsight - New Company Added to Portfolio]
description = Alert when a new company is added to monitoring
search = index=security_bitsight sourcetype=bitsight_portfolio | eval company_guid=coalesce(company_guid,guid), company_name=coalesce(company_name,name) | stats earliest(_time) as first_seen by company_name company_guid | where first_seen>relative_time(now(),"-24h") | convert ctime(first_seen) | table company_name company_guid first_seen
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 9 * * *
enableSched = 1
is_visible = 1
disabled = 0

[Bitsight - High Risk Vendors]
description = Report on vendors with ratings below acceptable threshold
search = index=security_bitsight sourcetype=bitsight_portfolio | eval company_guid=coalesce(company_guid,guid), company_name=coalesce(company_name,name) | where rating<600 | stats latest(rating) as rating values(industry) as industry by company_name company_guid tier | eval industry=mvjoin(industry,", "), risk_assessment=case(rating<400,"Unacceptable Risk",rating<500,"High Risk - Action Required",rating<600,"Elevated Risk - Monitor Closely") | sort 0 rating | table company_name tier industry rating risk_assessment
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 8 * * 1
enableSched = 1
is_visible = 1
disabled = 0

# =============================================================================
# COMPLIANCE AND REPORTING
# =============================================================================

[Bitsight - Weekly Executive Summary]
description = Weekly executive summary of security posture
search = index=security_bitsight (sourcetype=bitsight_portfolio OR sourcetype=bitsight_ratings OR sourcetype=bitsight_findings OR sourcetype=bitsight_credentials) | eval severity_norm=lower(severity) | stats dc(company_name) as monitored_companies avg(eval(if(sourcetype="bitsight_portfolio" OR sourcetype="bitsight_ratings",rating,null()))) as avg_rating count(eval(sourcetype="bitsight_findings" AND (severity_norm="critical" OR severity_norm="severe"))) as critical_findings count(eval(sourcetype="bitsight_credentials")) as credential_exposures | eval avg_rating=round(avg_rating,1), report_date=strftime(now(),"%Y-%m-%d") | table report_date monitored_companies avg_rating critical_findings credential_exposures
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
cron_schedule = 0 8 * * 1
enableSched = 1
is_visible = 1
disabled = 0

[Bitsight - Monthly Risk Report]
description = Monthly comprehensive risk assessment report
search = index=security_bitsight sourcetype=bitsight_ratings_history | stats earliest(rating) as month_start_rating latest(rating) as month_end_rating by company_name company_guid | eval rating_change=month_end_rating-month_start_rating, trend=case(rating_change>0,"Improved",rating_change<0,"Declined",true(),"Stable") | table company_name month_start_rating month_end_rating rating_change trend
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
cron_schedule = 0 6 1 * *
enableSched = 1
is_visible = 1
disabled = 0

# =============================================================================
# ALERT CORRELATION
# =============================================================================

[Bitsight - Multi-Vector Attack Indicator]
description = Correlate multiple risk vectors indicating coordinated attack
search = index=security_bitsight sourcetype=bitsight_findings | bin _time span=1h | stats dc(risk_vector) as vector_count values(risk_vector) as risk_vectors count as finding_count by company_name company_guid _time | where vector_count>=3 AND finding_count>=10 | eval alert_message="Multiple attack vectors detected: ".mvjoin(risk_vectors,", ") | table _time company_name company_guid vector_count finding_count alert_message
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 5
alert.track = 1

[Bitsight - Rapid Rating Degradation]
description = Alert on rapid rating drops indicating active compromise
search = index=security_bitsight sourcetype=bitsight_ratings_history | sort 0 company_guid _time | streamstats current=f last(rating) as prev_rating by company_guid | eval rating_drop=prev_rating-rating | where isnotnull(prev_rating) AND rating_drop>=30 | table _time company_name company_guid prev_rating rating rating_drop
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 5
alert.track = 1

# =============================================================================
# ADVANCED CORRELATION RULES
# =============================================================================

[Bitsight - NIST CSF Compliance Gap]
description = Alert when NIST CSF function scores fall below threshold
search = index=security_bitsight sourcetype=bitsight_risk_vectors | eval nist_function=case(name="dnssec" OR name="spf" OR name="dkim" OR name="dmarc","Identify",name="ssl_certificates" OR name="ssl_configurations" OR name="open_ports" OR name="patching_cadence" OR name="server_software" OR name="desktop_software" OR name="mobile_software" OR name="insecure_systems","Protect",name="botnet_infections" OR name="malware_servers" OR name="potentially_exploited" OR name="spam_propagation" OR name="unsolicited_comm","Detect",name="web_appsec" OR name="application_security" OR name="mobile_application_security","Respond",true(),"Recover") | stats avg(rating) as function_score by company_name company_guid nist_function | where function_score<500 | eval severity=case(function_score<300,"critical",function_score<400,"high",true(),"medium") | table company_name company_guid nist_function function_score severity
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 8 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 4
alert.track = 1

[Bitsight - SLA Breach Alert]
description = Alert when findings exceed SLA remediation timeframes
search = index=security_bitsight sourcetype=bitsight_findings | eval first_epoch=strptime(first_seen,"%Y-%m-%dT%H:%M:%S"), days_open=round((now()-first_epoch)/86400,0), severity_norm=lower(severity), sla_days=case(severity_norm="critical" OR severity_norm="severe",30,severity_norm="high" OR severity_norm="material",60,severity_norm="medium" OR severity_norm="moderate",90,true(),180) | where isnotnull(first_epoch) AND days_open>sla_days | eval days_overdue=days_open-sla_days | stats count as overdue_count sum(days_overdue) as total_days_overdue values(risk_vector) as risk_vectors by company_name company_guid severity | table company_name company_guid severity overdue_count total_days_overdue risk_vectors
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 9 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 4
alert.track = 1

[Bitsight - Peer Benchmark Deviation]
description = Alert when company rating deviates significantly from industry peers
search = index=security_bitsight sourcetype=bitsight_portfolio | eval company_guid=coalesce(company_guid,guid), company_name=coalesce(company_name,name) | dedup company_guid | eventstats avg(rating) as industry_avg stdev(rating) as industry_stdev by industry | eval z_score=if(industry_stdev>0,(rating-industry_avg)/industry_stdev,null()) | where isnotnull(z_score) AND z_score<-2 | eval deviation_msg="Rating ".round(industry_avg-rating,0)." points below industry average" | table company_name company_guid industry rating industry_avg z_score deviation_msg
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 7 * * 1
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 3
alert.track = 1

[Bitsight - Supply Chain Risk Cascade]
description = Correlate declining ratings across connected subsidiaries
search = index=security_bitsight sourcetype=bitsight_ratings_tree | spath | where is_bundled="true" OR tostring(is_bundled)="true" OR is_bundled=1 | stats avg(rating) as subsidiary_avg count as subsidiary_count values(name) as subsidiaries by parent_guid | where subsidiary_avg<550 AND subsidiary_count>=3 | eval alert_msg="Multiple subsidiaries with degraded ratings" | table parent_guid subsidiary_count subsidiary_avg subsidiaries alert_msg
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 */6 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 4
alert.track = 1

[Bitsight - Data Collection Health Alert]
description = Alert when data collection is stale or failing
search = | tstats latest(_time) as last_event where index=security_bitsight by sourcetype | eval age_hours=round((now()-last_event)/3600,2) | where age_hours>24 | eval status="CRITICAL: No data for ".round(age_hours,0)." hours" | table sourcetype last_event age_hours status
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
cron_schedule = 0 */2 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 4
alert.track = 1

[Bitsight - Anomalous Rating Change]
description = Detect unusual rating changes using statistical analysis
search = index=security_bitsight sourcetype=bitsight_ratings_history | sort 0 company_guid _time | streamstats window=30 avg(rating) as rolling_avg stdev(rating) as rolling_stdev by company_guid | eval z_score=if(rolling_stdev>0,(rating-rolling_avg)/rolling_stdev,0) | where abs(z_score)>3 | eval anomaly_type=if(z_score>0,"Unusual Improvement","Unusual Decline") | table _time company_name company_guid rating rolling_avg z_score anomaly_type
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
cron_schedule = 0 */4 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 3
alert.track = 1

[Bitsight - Combined Threat Indicator]
description = Correlate multiple threat signals across data sources
search = index=security_bitsight | eval severity_norm=lower(severity) | stats count(eval(sourcetype="bitsight_findings" AND (severity_norm="critical" OR severity_norm="severe"))) as critical_findings count(eval(sourcetype="bitsight_credentials")) as credential_exposures count(eval(sourcetype="bitsight_threats")) as threat_indicators latest(eval(if(sourcetype="bitsight_portfolio",rating,null()))) as current_rating by company_name company_guid | where critical_findings>5 OR credential_exposures>20 OR threat_indicators>0 | eval risk_score=(critical_findings*10)+(credential_exposures*2)+(threat_indicators*20), risk_level=case(risk_score>100,"Critical",risk_score>50,"High",risk_score>20,"Medium",true(),"Low") | table company_name company_guid current_rating critical_findings credential_exposures threat_indicators risk_score risk_level
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 4
alert.track = 1

# =============================================================================
# MTTR SLA MONITORING
# =============================================================================

[Bitsight - MTTR SLA Breach - Critical Findings]
description = Alert when critical or severe findings exceed 30-day MTTR SLA threshold
search = index=security_bitsight sourcetype=bitsight_findings | eval severity_norm=lower(severity), first_epoch=strptime(first_seen,"%Y-%m-%dT%H:%M:%S"), last_epoch=strptime(last_seen,"%Y-%m-%dT%H:%M:%S"), mttr_days=round((last_epoch-first_epoch)/86400,1) | where (severity_norm="critical" OR severity_norm="severe") AND isnotnull(first_epoch) AND isnotnull(last_epoch) AND mttr_days>30 | stats count as breach_count avg(mttr_days) as avg_mttr max(mttr_days) as max_mttr values(risk_vector) as risk_vectors by company_name company_guid | eval avg_mttr=round(avg_mttr,1), max_mttr=round(max_mttr,1), alert_msg="Critical findings exceeded 30-day SLA by avg of ".round(avg_mttr-30,1)." days" | table company_name company_guid breach_count avg_mttr max_mttr risk_vectors alert_msg
dispatch.earliest_time = -90d@d
dispatch.latest_time = now
cron_schedule = 0 8 * * *
enableSched = 1
is_visible = 1
disabled = 0
alert.severity = 5
alert.track = 1
action.email = 0
action.bitsight_webhook_alert = 0
action.bitsight_pagerduty_alert = 0

[Bitsight - MTTR SLA Breach - High Findings]
description = Alert when high or material findings exceed 60-day MTTR SLA threshold
search = index=security_bitsight sourcetype=bitsight_findings | eval severity_norm=lower(severity), first_epoch=strptime(first_seen,"%Y-%m-%dT%H:%M:%S"), last_epoch=strptime(last_seen,"%Y-%m-%dT%H:%M:%S"), mttr_days=round((last_epoch-first_epoch)/86400,1) | where (severity_norm="high" OR severity_norm="material") AND isnotnull(first_epoch) AND isnotnull(last_epoch) AND mttr_days>60 | stats count as breach_count avg(mttr_days) as avg_mttr max(mttr_days) as max_mttr values(risk_vector) as risk_vectors by company_name company_guid | eval avg_mttr=round(avg_mttr,1), max_mttr=round(max_mttr,1), alert_msg="High findings exceeded 60-day SLA by avg of ".round(avg_mttr-60,1)." days" | table company_name company_guid breach_count avg_mttr max_mttr risk_vectors alert_msg
dispatch.earliest_time = -180d@d
dispatch.latest_time = now
cron_schedule = 0 8 * * *
enableSched = 1
