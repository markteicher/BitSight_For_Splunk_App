#
# File: default/bitsight_settings.conf
# Bitsight app settings configuration
#
# =============================================================================
# PURPOSE
# =============================================================================
# Defines the default application settings used by the Bitsight app.
#
# This file controls:
# - API connectivity settings
# - proxy settings
# - input enablement defaults
# - collection interval defaults
# - historical collection defaults
# - logging defaults
# - validation state tracking
#
# =============================================================================
# FILE LOCATION
# =============================================================================
# App-relative path:
#   default/bitsight_settings.conf
#
# Local override path:
#   local/bitsight_settings.conf
#
# NOTE
# =============================================================================
# - Default values belong in default/bitsight_settings.conf
# - Environment-specific values belong in local/bitsight_settings.conf
# - Secrets must not be stored in the default file
#
# =============================================================================
# GRANULAR DOCUMENTATION SPECIFICATION
# =============================================================================
#
# STANZA: [settings]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines core API connection settings for the Bitsight platform.
#
# api_token:
#   Bitsight API token used for authenticated API access.
#
# base_url:
#   Base URL for the Bitsight API endpoint.
#
# verify_ssl:
#   Controls whether SSL certificate verification is enabled.
#
# timeout:
#   Request timeout value in seconds.
#
# STANZA: [proxy]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines optional proxy settings used for outbound API connectivity.
#
# proxy_enabled:
#   Controls whether proxy usage is enabled.
#
# proxy_url:
#   Proxy server URL.
#
# proxy_username:
#   Proxy username when proxy authentication is required.
#
# proxy_password:
#   Proxy password when proxy authentication is required.
#
# STANZA: [inputs]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines default enablement state for all supported Bitsight data inputs.
#
# input_portfolio:
#   Enables portfolio collection.
#
# input_ratings:
#   Enables current ratings collection.
#
# input_ratings_history:
#   Enables historical ratings collection.
#
# input_ratings_history_csv:
#   Enables ratings history CSV export collection.
#
# input_company_details:
#   Enables company details collection.
#
# input_country_details:
#   Enables country details collection.
#
# input_company_requests_summary:
#   Enables company requests summary collection.
#
# input_findings:
#   Enables findings collection.
#
# input_findings_compromised:
#   Enables compromised systems findings collection.
#
# input_findings_diligence:
#   Enables diligence findings collection.
#
# input_findings_summary:
#   Enables findings summary collection.
#
# input_finding_comments:
#   Enables finding comments collection.
#
# input_risk_vectors:
#   Enables risk vectors collection.
#
# input_alerts:
#   Enables alerts collection.
#
# input_threats:
#   Enables threats collection.
#
# input_exposed_credentials:
#   Enables exposed credentials collection.
#
# input_users:
#   Enables users collection.
#
# input_user_quota:
#   Enables user quota collection.
#
# input_user_company_views:
#   Enables user company views collection.
#
# input_folders:
#   Enables folders collection.
#
# input_tiers:
#   Enables tiers collection.
#
# input_industries:
#   Enables industries collection.
#
# input_assets:
#   Enables assets collection.
#
# input_asset_risk_matrix:
#   Enables asset risk matrix statistics collection.
#
# input_infrastructure:
#   Enables infrastructure collection.
#
# input_infrastructure_changes:
#   Enables infrastructure changes collection.
#
# input_ip_by_country:
#   Enables IP by country collection.
#
# input_diligence_statistics:
#   Enables diligence statistics collection.
#
# input_observations_statistics:
#   Enables observations statistics collection.
#
# input_industry_statistics:
#   Enables industry statistics collection.
#
# input_user_behavior_statistics:
#   Enables user behavior statistics collection.
#
# input_service_providers:
#   Enables service providers collection.
#
# input_products:
#   Enables products collection.
#
# input_ratings_tree:
#   Enables ratings tree collection.
#
# input_observations:
#   Enables observations collection.
#
# input_findings_summaries:
#   Enables findings summaries collection.
#
# input_findings_statistics:
#   Enables findings statistics collection.
#
# input_peer_analytics:
#   Enables peer analytics collection.
#
# input_rating_distribution:
#   Enables rating distribution collection.
#
# input_nist_csf_report:
#   Enables NIST CSF report collection.
#
# input_preview_report:
#   Enables preview report collection.
#
# input_risk_vectors_summary:
#   Enables risk vectors summary collection.
#
# STANZA: [collection]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines collection interval and historical collection defaults.
#
# portfolio_interval:
#   Portfolio collection interval in seconds.
#
# ratings_interval:
#   Current ratings collection interval in seconds.
#
# ratings_history_interval:
#   Historical ratings collection interval in seconds.
#
# ratings_history_csv_interval:
#   Ratings history CSV export collection interval in seconds.
#
# company_details_interval:
#   Company details collection interval in seconds.
#
# country_details_interval:
#   Country details collection interval in seconds.
#
# company_requests_summary_interval:
#   Company requests summary collection interval in seconds.
#
# findings_interval:
#   Findings collection interval in seconds.
#
# findings_compromised_interval:
#   Compromised findings collection interval in seconds.
#
# findings_diligence_interval:
#   Diligence findings collection interval in seconds.
#
# findings_summary_interval:
#   Findings summary collection interval in seconds.
#
# finding_comments_interval:
#   Finding comments collection interval in seconds.
#
# risk_vectors_interval:
#   Risk vectors collection interval in seconds.
#
# alerts_interval:
#   Alerts collection interval in seconds.
#
# threats_interval:
#   Threats collection interval in seconds.
#
# exposed_credentials_interval:
#   Exposed credentials collection interval in seconds.
#
# users_interval:
#   Users collection interval in seconds.
#
# user_quota_interval:
#   User quota collection interval in seconds.
#
# user_company_views_interval:
#   User company views collection interval in seconds.
#
# folders_interval:
#   Folders collection interval in seconds.
#
# tiers_interval:
#   Tiers collection interval in seconds.
#
# industries_interval:
#   Industries collection interval in seconds.
#
# assets_interval:
#   Assets collection interval in seconds.
#
# asset_risk_matrix_interval:
#   Asset risk matrix collection interval in seconds.
#
# infrastructure_interval:
#   Infrastructure collection interval in seconds.
#
# infrastructure_changes_interval:
#   Infrastructure changes collection interval in seconds.
#
# ip_by_country_interval:
#   IP by country collection interval in seconds.
#
# diligence_statistics_interval:
#   Diligence statistics collection interval in seconds.
#
# observations_statistics_interval:
#   Observations statistics collection interval in seconds.
#
# industry_statistics_interval:
#   Industry statistics collection interval in seconds.
#
# user_behavior_statistics_interval:
#   User behavior statistics collection interval in seconds.
#
# service_providers_interval:
#   Service providers collection interval in seconds.
#
# products_interval:
#   Products collection interval in seconds.
#
# ratings_tree_interval:
#   Ratings tree collection interval in seconds.
#
# observations_interval:
#   Observations collection interval in seconds.
#
# findings_summaries_interval:
#   Findings summaries collection interval in seconds.
#
# findings_statistics_interval:
#   Findings statistics collection interval in seconds.
#
# peer_analytics_interval:
#   Peer analytics collection interval in seconds.
#
# rating_distribution_interval:
#   Rating distribution collection interval in seconds.
#
# nist_csf_report_interval:
#   NIST CSF report collection interval in seconds.
#
# preview_report_interval:
#   Preview report collection interval in seconds.
#
# risk_vectors_summary_interval:
#   Risk vectors summary collection interval in seconds.
#
# days_back:
#   Default historical collection window in days.
#
# STANZA: [logging]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines application logging defaults.
#
# log_level:
#   Logging level used by the app.
#
# STANZA: [validation]
# -----------------------------------------------------------------------------
# Purpose:
#   Tracks validation and first-run state for the app.
#
# first_run:
#   Indicates whether the app is running validation/setup for the first time.
#
# validated:
#   Indicates whether the app configuration has been validated.
#
# last_validation:
#   Stores the timestamp of the last validation event.
#
# =============================================================================
# BITSIGHT APP SETTINGS
# =============================================================================

[settings]
api_token =
base_url = https://api.bitsighttech.com
verify_ssl = true
timeout = 60

[proxy]
proxy_enabled = false
proxy_url =
proxy_username =
