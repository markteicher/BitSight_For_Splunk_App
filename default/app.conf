#
# File: default/app.conf
# Splunk app configuration for Bitsight Security Ratings
#
# =============================================================================
# PURPOSE
# =============================================================================
# Defines the core Splunk app configuration for the Bitsight Security Ratings
# app.
#
# This file controls:
# - install state
# - UI visibility
# - app launcher metadata
# - package identifier
# - configuration reload triggers
#
# =============================================================================
# FILE LOCATION
# =============================================================================
# App-relative path:
#   default/app.conf
#
# Local override path, if needed:
#   local/app.conf
#
# =============================================================================
# APP LOGGING APPLICABILITY
# =============================================================================
# This file does not directly generate runtime application log events.
#
# Runtime logging for the BitSight app is handled by the app Python scripts,
# alert action scripts, validation scripts, setup handlers, and input scripts.
#
# Runtime app log file path:
#   $SPLUNK_HOME/etc/apps/BitSight_For_Splunk_App/var/log/bitsight.log
#
# Expected indexed search target:
#   index=security_bitsight sourcetype=bitsight_logging
#
# This file only defines app metadata and reload behavior.
#
# =============================================================================
# GRANULAR DOCUMENTATION SPECIFICATION
# =============================================================================
#
# STANZA: [install]
# -----------------------------------------------------------------------------
# Purpose:
#   Controls install-time application state and configuration status.
#
# Logging applicability:
#   No direct runtime logging is defined in this stanza.
#
# is_configured:
#   Indicates whether the app setup process has been completed.
#
# build:
#   Internal build number for the app package.
#
# state:
#   App state within Splunk.
#
# STANZA: [ui]
# -----------------------------------------------------------------------------
# Purpose:
#   Controls whether the app is visible in the Splunk UI and which setup view
#   is used.
#
# Logging applicability:
#   No direct runtime logging is defined in this stanza.
#
# is_visible:
#   Controls app visibility in the Splunk user interface.
#
# label:
#   Display label shown in the Splunk app launcher.
#
# setup_view:
#   The setup view name used by the app.
#   This must align with the actual setup view delivered by the app.
#
# STANZA: [launcher]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines launcher metadata displayed in Splunk.
#
# Logging applicability:
#   No direct runtime logging is defined in this stanza.
#
# description:
#   Descriptive text shown in the app launcher.
#
# version:
#   Version string for the app release.
#
# STANZA: [package]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines package-level metadata.
#
# Logging applicability:
#   No direct runtime logging is defined in this stanza.
#
# id:
#   Splunk app package identifier.
#
# check_for_updates:
#   Controls whether Splunk checks for app updates.
#
# STANZA: [triggers]
# -----------------------------------------------------------------------------
# Purpose:
#   Defines configuration reload triggers for app-managed knowledge objects and
#   app-specific configuration.
#
# Logging applicability:
#   Reload behavior may indirectly affect app runtime behavior, but this stanza
#   does not directly write BitSight application log events.
#
# reload.bitsight:
#   Reload trigger for the app-specific bitsight configuration namespace.
#
# reload.transforms:
#   Reload trigger for lookup transform definitions in transforms.conf.
#
# reload.props:
#   Reload trigger for field extraction and parsing rules in props.conf.
#
# reload.macros:
#   Reload trigger for search macro definitions in macros.conf.
#
# reload.savedsearches:
#   Reload trigger for scheduled searches and alert definitions in
#   savedsearches.conf.
#
# reload.alert_actions:
#   Reload trigger for custom alert action definitions in alert_actions.conf.
#
# =============================================================================
# SPLUNK APP CONFIGURATION
# =============================================================================

[install]
is_configured = 0
build = 1
state = enabled

[ui]
is_visible = 1
label = Bitsight Security Ratings
setup_view = setup

[launcher]
description = Bitsight Security Ratings integration for Splunk. Monitor security ratings, portfolio companies, alerts, findings, exposed credentials, and threats from the Bitsight API.
version = 1.0.0

[package]
id = BitSight_For_Splunk_App
check_for_updates = 1

[triggers]
reload.bitsight = simple
reload.transforms = simple
reload.props = simple
reload.macros = simple
reload.savedsearches = simple
reload.alert_actions = simple
