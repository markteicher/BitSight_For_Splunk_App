#
# File: default/alert_actions.conf
# Bitsight alert actions configuration
#
# =============================================================================
# PURPOSE
# =============================================================================
# Defines custom alert action stanzas used by the Bitsight app for automated
# notification and downstream integration workflows.
#
# This file defines:
# - custom email notification action
# - custom webhook notification action
# - custom script execution action
# - ServiceNow incident creation action
# - PagerDuty incident trigger action
#
# =============================================================================
# FILE LOCATION
# =============================================================================
# App-relative path:
#   default/alert_actions.conf
#
# Local override path, if needed:
#   local/alert_actions.conf
#
# =============================================================================
# APP LOGGING MODEL
# =============================================================================
# Runtime logging for these alert actions is handled by the corresponding
# Python scripts in the app bin directory.
#
# Alert action execution logs are written to:
#   $SPLUNK_HOME/etc/apps/BitSight_For_Splunk_App/var/log/bitsight.log
#
# Expected indexed search target:
#   index=security_bitsight sourcetype=bitsight_logging
#
# Logging script mappings:
# - bitsight_email_alert      -> bin/bitsight_email_alert.py
# - bitsight_webhook_alert    -> bin/bitsight_webhook_alert.py
# - bitsight_script_alert     -> bin/bitsight_script_alert.py
# - bitsight_snow_alert       -> bin/bitsight_snow_alert.py
# - bitsight_pagerduty_alert  -> bin/bitsight_pagerduty_alert.py
#
# =============================================================================
# GRANULAR DOCUMENTATION SPECIFICATION
# =============================================================================
#
# STANZA: [bitsight_email_alert]
# -----------------------------------------------------------------------------
# Purpose:
#   Sends email notifications for Bitsight alert activity.
#
# Runtime logging:
#   Logged by bin/bitsight_email_alert.py to var/log/bitsight.log
#
# is_custom:
#   Marks this stanza as a custom alert action.
#
# label:
#   Display name shown in Splunk for this alert action.
#
# description:
#   Human-readable description of the alert action.
#
# icon_path:
#   Icon used by Splunk for this alert action.
#
# payload_format:
#   Payload format used by the action.
#
# disabled:
#   Enables or disables the alert action definition.
#
# param.to:
#   Primary email recipients.
#
# param.cc:
#   Carbon copy recipients.
#
# param.subject:
#   Email subject template.
#
# param.message:
#   Email body template.
#
# param.include_results:
#   Controls whether search results are included.
#
# param.include_link:
#   Controls whether a Splunk results link is included.
#
# param.priority:
#   Email priority value.
#
# STANZA: [bitsight_webhook_alert]
# -----------------------------------------------------------------------------
# Purpose:
#   Sends webhook notifications to external systems such as Slack, Teams,
#   PagerDuty, or other HTTP endpoints.
#
# Runtime logging:
#   Logged by bin/bitsight_webhook_alert.py to var/log/bitsight.log
#
# param.webhook_url:
#   Destination webhook URL.
#
# param.method:
#   HTTP method used for the webhook request.
#
# param.content_type:
#   HTTP Content-Type header value.
#
# param.include_results:
#   Controls whether search results are included in the action context.
#
# param.custom_headers:
#   Additional HTTP headers, if required.
#
# param.verify_ssl:
#   Controls SSL certificate verification behavior.
#
# param.timeout:
#   HTTP timeout in seconds.
#
# param.payload_template:
#   JSON payload template sent to the webhook endpoint.
#
# STANZA: [bitsight_script_alert]
# -----------------------------------------------------------------------------
# Purpose:
#   Executes a custom script for Bitsight alert handling workflows such as
#   ticket creation or SOAR integration.
#
# Runtime logging:
#   Logged by bin/bitsight_script_alert.py to var/log/bitsight.log
#
# param.script_name:
#   Script file name to execute.
#
# param.script_args:
#   Additional arguments passed to the script.
#
# param.pass_payload:
#   Controls whether alert payload data is passed to the script.
#
# STANZA: [bitsight_snow_alert]
# -----------------------------------------------------------------------------
# Purpose:
#   Creates ServiceNow incidents for significant Bitsight alert conditions.
#
# Runtime logging:
#   Logged by bin/bitsight_snow_alert.py to var/log/bitsight.log
#
# param.snow_url:
#   ServiceNow instance URL.
#
# param.snow_user:
#   ServiceNow username.
#
# param.snow_password:
#   ServiceNow password or credential reference.
#
# param.incident_category:
#   ServiceNow incident category value.
#
# param.incident_subcategory:
#   ServiceNow incident subcategory value.
#
# param.incident_priority:
#   ServiceNow incident priority value.
#
# param.incident_short_description:
#   ServiceNow incident short description template.
#
# param.incident_description:
#   ServiceNow incident long description template.
#
# STANZA: [bitsight_pagerduty_alert]
# -----------------------------------------------------------------------------
# Purpose:
#   Triggers PagerDuty incidents for critical Bitsight alerts.
#
# Runtime logging:
#   Logged by bin/bitsight_pagerduty_alert.py to var/log/bitsight.log
#
# param.routing_key:
#   PagerDuty Events API routing key.
#
# param.severity:
#   PagerDuty severity value.
#
# param.dedup_key:
#   PagerDuty deduplication key template.
#
# param.event_action:
#   PagerDuty event action value.
#
# param.summary:
#   PagerDuty incident summary template.
#
# param.source:
#   PagerDuty event source value.
#
# param.component:
#   PagerDuty component value.
#
# param.group:
#   PagerDuty group value.
#
# param.class:
#   PagerDuty class value.
#
# =============================================================================
# ALERT ACTION DEFINITIONS
# =============================================================================

# ============================================================================
# EMAIL ALERT ACTION
# ============================================================================
[bitsight_email_alert]
is_custom = 1
label = Bitsight Email Alert
description = Send email notification for Bitsight security rating changes
icon_path = appIcon.png
payload_format = json
disabled = 0

param.to =
param.cc =
param.subject = [Bitsight Alert] $name$
param.message = Bitsight Security Alert\n\nAlert: $name$\nTime: $trigger_time$\nResults: $result.count$ events matched\n\nDetails:\n$result._raw$
param.include_results = 1
param.include_link = 1
param.priority = normal

# ============================================================================
# WEBHOOK ALERT ACTION
# ============================================================================
[bitsight_webhook_alert]
is_custom = 1
label = Bitsight Webhook Alert
description = Send webhook notification to external systems (Slack, Teams, PagerDuty, etc.)
icon_path = appIcon.png
payload_format = json
disabled = 0

param.webhook_url =
param.method = POST
param.content_type = application/json
param.include_results = 1
param.custom_headers =
param.verify_ssl = 1
param.timeout = 30
param.payload_template = {"alert_name": "$name$", "trigger_time": "$trigger_time$", "results_count": "$result.count$", "search_name": "$search_name$", "app": "$app$", "owner": "$owner$", "results_link": "$results_link$", "severity": "$result.severity$", "company": "$result.company_name$", "rating": "$result.rating$", "rating_change": "$result.rating_change$"}

# ============================================================================
# SCRIPT ALERT ACTION
# ============================================================================
[bitsight_script_alert]
is_custom = 1
label = Bitsight Script Alert
description = Execute custom script for Bitsight alerts (ticket creation, SOAR integration, etc.)
icon_path = appIcon.png
payload_format = json
disabled = 0

param.script_name = bitsight_alert_script.py
param.script_args =
param.pass_payload = 1

# ============================================================================
# SERVICENOW INTEGRATION
# ============================================================================
[bitsight_snow_alert]
is_custom = 1
label = Bitsight ServiceNow Alert
description = Create ServiceNow incidents for critical Bitsight findings
icon_path = appIcon.png
payload_format = json
disabled = 0

param.snow_url =
param.snow_user =
param.snow_password =
param.incident_category = Security
param.incident_subcategory = Vendor Risk
param.incident_priority = 3
param.incident_short_description = [Bitsight] $result.company_name$ - Rating Alert
param.incident_description = Security rating alert triggered for $result.company_name$.\n\nCurrent Rating: $result.rating$\nChange: $result.rating_change$\nRisk Vectors Affected: $result.risk_vectors$\n\nAlert Details:\nName: $name$\nTime: $trigger_time$

# ============================================================================
# PAGERDUTY INTEGRATION
# ============================================================================
[bitsight_pagerduty_alert]
is_custom = 1
label = Bitsight PagerDuty Alert
description = Trigger PagerDuty incidents for critical Bitsight alerts
icon_path = appIcon.png
payload_format = json
disabled = 0

param.routing_key =
param.severity = error
param.dedup_key = bitsight-$result.company_guid$-$result.risk_vector$
param.event_action = trigger
param.summary = Bitsight Alert: $result.company_name$ - $name$
param.source = Splunk Bitsight App
param.component = $result.risk_vector$
param.group = vendor-risk
param.class = security-rating
