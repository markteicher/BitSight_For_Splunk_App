# =============================================================================
# default/restmap.conf
# BitSight for Splunk App
# REST API Endpoint Configuration
# =============================================================================
#
# PURPOSE
#
# This file defines the Splunk REST administration endpoints used by the
# BitSight app setup and validation interface.
#
# WHAT THIS FILE CONTROLS
#
# - the root admin namespace exposed by the app
# - the child admin endpoints available under that namespace
# - the Python handler file responsible for processing requests
# - the allowed handler actions for each endpoint
# - the Python runtime version used by the handlers
#
# ENDPOINT MODEL
#
# Root admin namespace:
#
#   /servicesNS/<user>/<app>/admin/bitsight
#
# Child endpoints registered under that namespace:
#
# - bitsight_settings
# - bitsight_test
#
# HANDLER MODEL
#
# Both admin endpoints are served by:
#
#   bitsight_setup_handler.py
#
# The same handler file is used for:
#
# - settings retrieval / update
# - connectivity / validation operations
#
# ALLOWED ACTIONS
#
# Both endpoints allow:
#
# - list
# - edit
#
# PERSISTENT MODE
#
# handlerpersistentmode = true
#
# This keeps the Python handler process persistent for improved responsiveness
# and reduced startup overhead during setup operations.
#
# PYTHON RUNTIME
#
# python.version = python3
#
# This ensures the handler is executed using Python 3.
#
# CHANGE CONTROL NOTES
#
# Review this file if any of the following change:
#
# - handler filename changes
# - setup endpoint names change
# - additional admin endpoints are introduced
# - handler actions need to expand or narrow
# - Python runtime requirements change
#
# =============================================================================
# ROOT ADMIN COLLECTION
# =============================================================================

[admin:bitsight]

# -----------------------------------------------------------------------------
# Root REST admin path for the BitSight app
# -----------------------------------------------------------------------------
match = /bitsight

# -----------------------------------------------------------------------------
# Child admin endpoints registered beneath /bitsight
# -----------------------------------------------------------------------------
members = bitsight_settings, bitsight_test

# =============================================================================
# SETTINGS ENDPOINT
# =============================================================================

[admin_external:bitsight_settings]

# -----------------------------------------------------------------------------
# External admin handler implemented in Python
# -----------------------------------------------------------------------------
handlertype = python

# -----------------------------------------------------------------------------
# Python handler file for setup configuration operations
# -----------------------------------------------------------------------------
handlerfile = bitsight_setup_handler.py

# -----------------------------------------------------------------------------
# Allowed REST actions for this endpoint
# -----------------------------------------------------------------------------
handleractions = list, edit

# -----------------------------------------------------------------------------
# Keep handler process persistent
# -----------------------------------------------------------------------------
handlerpersistentmode = true

# -----------------------------------------------------------------------------
# Execute handler with Python 3
# -----------------------------------------------------------------------------
python.version = python3

# =============================================================================
# TEST / VALIDATION ENDPOINT
# =============================================================================

[admin_external:bitsight_test]

# -----------------------------------------------------------------------------
# External admin handler implemented in Python
# -----------------------------------------------------------------------------
handlertype = python

# -----------------------------------------------------------------------------
# Python handler file for validation / connectivity test operations
# -----------------------------------------------------------------------------
handlerfile = bitsight_setup_handler.py

# -----------------------------------------------------------------------------
# Allowed REST actions for this endpoint
# -----------------------------------------------------------------------------
handleractions = list, edit

# -----------------------------------------------------------------------------
# Keep handler process persistent
# -----------------------------------------------------------------------------
handlerpersistentmode = true

# -----------------------------------------------------------------------------
# Execute handler with Python 3
# -----------------------------------------------------------------------------
python.version = python3
